services:
  - type: web
    name: retention-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /aistudent/ren/health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_BASE_PATH
        value: /aistudent
      - key: API_V1_STR
        value: /ren
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 120
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: RATE_LIMIT_REQUESTS
        value: 120
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: AUTH_RATE_LIMIT_REQUESTS
        value: 40
      - key: AUTH_RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: MODEL_DIR
        value: backend/models
      - key: FORCE_HTTPS
        value: "True"
      - key: RUN_STARTUP_DB_INIT
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
